            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "success"
                  source:
                    type: string
                    description: Penanda bahwa data berasal dari API eksternal kelompok UMKM
                    example: "external_umkm_api"
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TenantUmkm'
              example:
                status: "success"
                source: "external_umkm_api"
