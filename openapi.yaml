                    deskripsi: "Soto Sokaraja khas Banyumas dengan bumbu kacang"
                    created_at: "2025-05-01T08:00:00+07:00"
                  - id: "f3a4b5c6-d7e8-9f0a-1b2c-d3e4f5a6b7c8"
                    nama_tenant: "Batik Banyumas Bu Endang"
                    kategori: "fashion"
                    nomor_stand: "B-12"
                    deskripsi: "Batik tulis dan cap khas Banyumas motif jahe srimpang"
                    created_at: "2025-05-01T08:30:00+07:00"
                  - id: "a4b5c6d7-e8f9-0a1b-2c3d-e4f5a6b7c8d9"
                    nama_tenant: "Keripik Tempe Mendoan Pak Tono"
                    kategori: "makanan"
                    nomor_stand: "A-09"
                    deskripsi: "Keripik tempe mendoan dan mendoan basah khas Purwokerto"
                    created_at: "2025-05-02T09:00:00+07:00"
                  - id: "b5c6d7e8-f9a0-1b2c-3d4e-f5a6b7c8d9e0"
                    nama_tenant: "Wedang Uwuh Bu Lastri"
                    kategori: "minuman"
                    nomor_stand: "C-03"
                    deskripsi: "Minuman herbal tradisional wedang uwuh dan jahe merah"
                    created_at: "2025-05-02T10:00:00+07:00"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '502':
          description: Flask API gagal menghubungi API eksternal kelompok UMKM.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                status: "error"
                message: "Gagal mengambil data dari API eksternal kelompok UMKM"

# ═══════════════════════════════════════════════════════════════════════════
# COMPONENTS
# ═══════════════════════════════════════════════════════════════════════════

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT Token yang diperoleh dari endpoint `POST /api/auth/login`.
        Dikelola oleh Supabase Authentication.
        Format: `Authorization: Bearer <token>`

  # ─────────────────────────────────────────────────────────────────────────
  # SCHEMAS
  # ─────────────────────────────────────────────────────────────────────────

  schemas:

    # ── AUTH ──────────────────────────────────────────────────────────────

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          description: Email pengguna (Admin atau Petugas) — unik di tabel ADMIN
          example: "admin@pekenbanyumasan.id"
        password:
          type: string
          format: password
          description: Password akun Supabase Auth
          example: "password_rahasia"

    LoginResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        message:
          type: string
          example: "Login berhasil"
        data:
          type: object
          properties:
            token:
              type: string
              description: JWT Token untuk digunakan pada header Authorization
              example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
            user:
              $ref: '#/components/schemas/AdminUser'

    AdminUser:
      type: object
      description: Data pengguna yang berhasil login (dari tabel ADMIN)
      properties:
        id:
          type: string
          format: uuid
          description: Primary Key ADMIN (auto-generated UUID)
        nama:
          type: string
          description: Nama lengkap admin/petugas
          maxLength: 100
          example: "Ahmad Al-Farizi"
        email:
          type: string
          format: email
          description: Email untuk login (unique)
          maxLength: 100
          example: "admin@pekenbanyumasan.id"
        role:
          type: string
          enum: [admin, petugas]
          description: "Peran pengguna: admin (Full Access) atau petugas (Limited Access) — REQ-AUTH-002"
          example: "admin"

    # ── NFC TAP ───────────────────────────────────────────────────────────

    TapRequest:
      type: object
      required:
        - uid
        - timestamp
      properties:
        uid:
          type: string
          description: |
            UID unik dari NFC Tag Keyfob 13.56 MHz yang dibaca NFC Reader.
            UID tertanam permanen pada chip dan tidak dapat diubah atau digandakan.
          maxLength: 50
          example: "04:A3:2B:C1:5E:7F:80"
        timestamp:
          type: string
          format: date-time
          description: Waktu tap yang dicatat oleh NFC Reader (ISO 8601)
          example: "2025-06-01T09:30:00+07:00"

    TapResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        message:
          type: string
          example: "Tap masuk berhasil dicatat"
        data:
          type: object
          properties:
            kunjungan_id:
              type: string
              format: uuid
              description: ID kunjungan yang baru dibuat di tabel KUNJUNGAN
            event_id:
              type: string
              format: uuid
              description: |
                ID event aktif yang diresolvasi otomatis oleh Flask API dari tabel EVENT
                (event dengan `status = 'aktif'`). Disertakan dalam response sebagai
                konfirmasi event yang sedang berlangsung saat tap terjadi.
            member_id:
              type: string
              format: uuid
              description: ID member dari tabel MEMBER
            nama_member:
              type: string
              description: Nama lengkap member
            aksi:
              type: string
              enum: [masuk, keluar]
              description: Jenis aksi tap yang berhasil dicatat
            waktu_masuk:
              type: string
              format: date-time
              description: Waktu tap masuk (KUNJUNGAN.waktu_masuk)
            waktu_keluar:
              type: string
              format: date-time
              nullable: true
              description: Waktu tap keluar (KUNJUNGAN.waktu_keluar), null jika baru masuk
            status:
              type: string
              enum: [di_dalam, keluar]
              description: Status kunjungan setelah tap (KUNJUNGAN.status)

    # ── MEMBER ────────────────────────────────────────────────────────────

    Member:
      type: object
      description: Data member beserta UID NFC Tag Keyfob (tabel MEMBER di Supabase)
      properties:
        id:
          type: string
          format: uuid
          description: Primary Key (auto-generated UUID)
        nfc_uid:
          type: string
          description: UID unik dari chip NFC Tag Keyfob (unique, max 50 karakter)
          maxLength: 50
          example: "04:A3:2B:C1:5E:7F:80"
        nama:
          type: string
          description: Nama lengkap member (max 100 karakter)
          maxLength: 100
          example: "Budi Santoso"
        no_hp:
          type: string
          description: Nomor handphone member (max 20 karakter)
          maxLength: 20
          example: "081234567890"
        email:
          type: string
          format: email
          description: Email member (opsional, max 100 karakter)
          maxLength: 100
          nullable: true
          example: "budi@email.com"
        status:
          type: string
          enum: [aktif, nonaktif]
          description: Status keanggotaan member
          example: "aktif"
        tanggal_daftar:
          type: string
          format: date
          description: Tanggal pendaftaran member
          example: "2025-05-01"
        created_at:
          type: string
          format: date-time
          description: Waktu data dibuat (auto-generated)
          example: "2025-05-01T08:00:00+07:00"

    CreateMemberRequest:
      type: object
      required:
        - nfc_uid
        - nama
        - no_hp
        - status
        - tanggal_daftar
      properties:
        nfc_uid:
          type: string
          description: UID NFC Tag Keyfob yang diberikan kepada member (harus unik)
          maxLength: 50
          example: "04:A3:2B:C1:5E:7F:80"
        nama:
          type: string
          description: Nama lengkap member
          maxLength: 100
          example: "Budi Santoso"
        no_hp:
          type: string
          description: Nomor handphone member
          maxLength: 20
          example: "081234567890"
        email:
          type: string
          format: email
          description: Email member (opsional)
          maxLength: 100
          nullable: true
          example: "budi@email.com"
        status:
          type: string
          enum: [aktif, nonaktif]
          description: Status keanggotaan awal
          example: "aktif"
        tanggal_daftar:
          type: string
          format: date
          description: Tanggal pendaftaran member
          example: "2025-06-01"

    UpdateMemberRequest:
      type: object
      description: Semua field bersifat opsional — hanya field yang disertakan yang akan diupdate
      properties:
        nfc_uid:
          type: string
          description: UID NFC Tag Keyfob baru (harus unik jika diubah)
          maxLength: 50
        nama:
          type: string
          description: Nama lengkap member
          maxLength: 100
        no_hp:
          type: string
          description: Nomor handphone member
          maxLength: 20
        email:
          type: string
          format: email
          description: Email member (opsional)
          maxLength: 100
          nullable: true
        status:
          type: string
          enum: [aktif, nonaktif]
          description: Status keanggotaan

    # ── KUNJUNGAN ─────────────────────────────────────────────────────────

    Kunjungan:
      type: object
      description: Data kunjungan satu record (tabel KUNJUNGAN di Supabase)
      properties:
        id:
          type: string
          format: uuid
          description: Primary Key (auto-generated UUID)
        event_id:
          type: string
          format: uuid
          description: Foreign Key → tabel EVENT
        member_id:
          type: string
          format: uuid
          nullable: true
          description: Foreign Key → tabel MEMBER. NULL untuk pengunjung biasa.
        tipe_pengunjung:
          type: string
          enum: [member, biasa]
          description: Jenis pengunjung
          example: "biasa"
        waktu_masuk:
          type: string
          format: date-time
          description: Waktu tap masuk atau input manual masuk
          example: "2025-06-01T10:00:00+07:00"
        waktu_keluar:
          type: string
          format: date-time
          nullable: true
          description: Waktu tap keluar (NULL jika pengunjung masih di dalam)
          example: null
        status:
          type: string
          enum: [di_dalam, keluar]
          description: Status keberadaan pengunjung saat ini
          example: "di_dalam"
        dicatat_oleh:
          type: string
          format: uuid
          description: Foreign Key → tabel ADMIN (petugas yang menginput)
        created_at:
          type: string
          format: date-time
          description: Waktu record dibuat (auto-generated)

    ManualVisitorRequest:
      type: object
      required:
        - aksi
        - event_id
      properties:
        aksi:
          type: string
          enum: [masuk, keluar]
          description: Aksi yang dilakukan — masuk (REQ-MANUAL-001) atau keluar (REQ-MANUAL-002)
          example: "masuk"
        event_id:
          type: string
          format: uuid
          description: ID event yang sedang berlangsung (Foreign Key → tabel EVENT)
          example: "c7d8e9f0-a1b2-3c4d-5e6f-789012345678"

    # ── DASHBOARD STATS ───────────────────────────────────────────────────

    DashboardStatsResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        data:
          type: object
          description: Agregasi dari view `v_dashboard_stats` di Supabase
          properties:
            tanggal:
              type: string
              format: date
              description: Tanggal statistik
              example: "2025-06-01"
            event_id:
              type: string
              format: uuid
              description: ID event yang sedang dipantau
            nama_event:
              type: string
              description: Nama event yang sedang berlangsung
              example: "Peken Banyumasan Juni 2025"
            total_masuk:
              type: integer
              description: "Total pengunjung yang telah masuk hari ini (REQ-DASH-001)"
              example: 350
            di_dalam:
              type: integer
              description: "Jumlah pengunjung yang sedang berada di dalam area event (REQ-DASH-002)"
              example: 120
            total_keluar:
              type: integer
              description: "Jumlah pengunjung yang telah keluar (REQ-DASH-003)"
              example: 230
            total_harian:
              type: integer
              description: "Total pengunjung dalam satu hari ini (REQ-DASH-004)"
              example: 350

    # ── LAPORAN ───────────────────────────────────────────────────────────

    ReportResponse:
      type: object
      properties:
        status:
          type: string
          example: "success"
        data:
          type: object
          description: Data dari view `v_kunjungan_harian` di Supabase
          properties:
            tanggal:
              type: string
              format: date
              example: "2025-06-01"
            event_id:
              type: string
              format: uuid
            nama_event:
              type: string
              example: "Peken Banyumasan Juni 2025"
            ringkasan:
              type: object
              properties:
                total_kunjungan:
                  type: integer
                  example: 350
                total_member:
                  type: integer
                  example: 200
                total_biasa:
                  type: integer
                  example: 150
            detail:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  tipe_pengunjung:
                    type: string
                    enum: [member, biasa]
                  nama_member:
                    type: string
                    nullable: true
                    description: Nama member, null untuk pengunjung biasa
                  waktu_masuk:
                    type: string
                    format: date-time
                  waktu_keluar:
                    type: string
                    format: date-time
                    nullable: true
                  durasi_menit:
                    type: integer
                    nullable: true
                    description: Durasi kunjungan dalam menit (null jika masih di dalam)
                  status:
                    type: string
                    enum: [di_dalam, keluar]

    # ── DISKON UMKM ───────────────────────────────────────────────────────

    TenantUmkm:
      type: object
      description: Data tenant UMKM yang berpartisipasi di event (tabel TENANT_UMKM)
      properties:
        id:
          type: string
          format: uuid
          description: Primary Key
        nama_tenant:
          type: string
          description: Nama UMKM/tenant (max 100 karakter)
          maxLength: 100
          example: "Warung Soto Sokaraja Pak Joko"
        kategori:
          type: string
          description: Kategori produk (max 50 karakter)
          maxLength: 50
          example: "makanan"
        nomor_stand:
          type: string
          description: Nomor stand di area event (max 10 karakter)
          maxLength: 10
          example: "A-05"
        deskripsi:
          type: string
          description: Deskripsi singkat tenant
          example: "Soto Sokaraja khas Banyumas dengan bumbu kacang"
        created_at:
          type: string
          format: date-time
          description: Waktu data dibuat

    DiskonMember:
      type: object
      description: Data diskon/benefit member dari tenant UMKM (tabel DISKON_MEMBER)
      properties:
        id:
          type: string
          format: uuid
          description: Primary Key
        tenant:
          $ref: '#/components/schemas/TenantUmkm'
        deskripsi_diskon:
          type: string
          description: Deskripsi benefit/diskon untuk member
          example: "Diskon 15% untuk semua menu bagi member aktif"
        persentase_diskon:
          type: number
          format: decimal
          description: Persentase diskon (DECIMAL 5,2 — contoh 15.00 = 15%)
          minimum: 0
          maximum: 100
          example: 15.00
        berlaku_mulai:
          type: string
          format: date
          description: Tanggal mulai berlaku diskon
          example: "2025-06-01"
        berlaku_hingga:
          type: string
          format: date
          description: Tanggal berakhir diskon
          example: "2025-06-30"
        is_aktif:
          type: boolean
          description: Status aktif diskon
          example: true

    # ── ERROR ─────────────────────────────────────────────────────────────

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: "error"
        message:
          type: string
          description: Pesan error yang informatif
          example: "Terjadi kesalahan pada server"

  # ─────────────────────────────────────────────────────────────────────────
  # RESPONSES (REUSABLE)
  # ─────────────────────────────────────────────────────────────────────────

  responses:
    Unauthorized:
      description: Token JWT tidak ada, kadaluarsa, atau tidak valid.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: "error"
            message: "Token tidak valid atau telah kadaluarsa. Silakan login kembali."

    Forbidden:
      description: |
        Akses ditolak. Pengguna tidak memiliki hak akses yang diperlukan
        untuk endpoint ini (REQ-AUTH-002 — Role-Based Access Control).
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            status: "error"
            message: "Akses ditolak. Hanya Admin yang dapat mengakses fitur ini."
