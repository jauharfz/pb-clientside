  # ─────────────────────────────────────────────────────────────────────────
  # INTEGRASI UMKM (EXTERNAL)
  # [KOREKSI-2b] Endpoint baru GET /umkm ditambahkan sesuai SDD RTM (Seksi 6)
  # yang secara eksplisit mendefinisikan "GET /api/umkm (external)" sebagai
  # komponen Flask API untuk REQ-INTEG-001.
  # ─────────────────────────────────────────────────────────────────────────

  /umkm:
    get:
      tags:
        - Integrasi UMKM
      summary: Ambil data tenant UMKM dari API eksternal kelompok UMKM
      description: |
        Endpoint integrasi Flask API dengan **API eksternal kelompok UMKM**.
        Flask API bertindak sebagai proxy — mengambil data tenant dan diskon
        dari sistem eksternal kelompok UMKM, lalu meneruskannya ke frontend React.

        Berbeda dengan `GET /discounts` yang membaca data internal tabel `DISKON_MEMBER`
        di Supabase (REQ-MEMBER-002), endpoint ini secara spesifik memenuhi kebutuhan
        **integrasi** dengan sistem pihak ketiga (REQ-INTEG-001).

        **Requirement:** REQ-INTEG-001
        **Aktor:** Admin
        **Akses:** Admin only (JWT dengan role `admin`)
      operationId: getUmkm
      security:
        - BearerAuth: []
      parameters:
        - name: kategori
